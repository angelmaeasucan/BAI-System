<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Payment Form</title>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

<style>
    body {
        font-family: Arial, sans-serif;
        background: #f4f6f9;
        margin: 0;
    }

    .container {
        display: flex;
        min-height: 100vh;
    }

    .sidebar {
        width: 260px;
        background: #2c3e50;
        color: white;
        padding: 20px 15px;
    }

    .sidebar .logo-title {
        text-align: center;
        margin-bottom: 20px;
        font-size: 18px;
        font-weight: bold;
    }

    .sidebar .logo-title i {
        font-size: 28px;
        display: block;
        margin-bottom: 5px;
        color: #ecf0f1;
    }

    .sidebar a {
        display: flex;
        align-items: center;
        padding: 12px;
        margin: 5px 0;
        color: white;
        text-decoration: none;
        border-radius: 5px;
    }

    .sidebar a i {
        margin-right: 10px;
        width: 20px;
        text-align: center;
    }

    .sidebar a:hover, .sidebar a.active {
        background: #34495e;
    }

    .main-content {
        flex: 1;
        padding: 20px;
    }

    .page-header {
        margin-bottom: 25px;
        padding-bottom: 10px;
        border-bottom: 1px solid #ddd;
    }

    .form-card {
        max-width: 600px;
        background: white;
        padding: 25px;
        border-radius: 10px;
        box-shadow: 0 4px 10px rgba(0,0,0,0.1);
        margin: 0 auto;
    }

    label {
        font-weight: bold;
        display: block;
        margin-top: 10px;
    }

    input, select {
        width: 100%;
        padding: 10px;
        margin-top: 5px;
        border: 1px solid #ccc;
        border-radius: 5px;
    }

    button {
        width: 100%;
        padding: 12px;
        margin-top: 20px;
        background: #28a745;
        color: white;
        border: none;
        border-radius: 5px;
        font-size: 16px;
        cursor: pointer;
    }

    button:hover {
        background: #218838;
    }
</style>
</head>

<body>

<div class="container">
    <div class="sidebar">
        <div class="logo-title">
            <i class="fas fa-house"></i>
            <span>HomeTech</span>
        </div>
        <a href="{{ url_for('cashier_dashboard') }}"><i class="fas fa-chart-line"></i> Dashboard</a>
        <a href="{{ url_for('cashier_customer_management') }}"><i class="fas fa-users"></i> Customer</a>
        <a href="{{ url_for('cashier_products_management') }}"><i class="fas fa-box"></i> Products</a>
        <a href="{{ url_for('cashier_sales_management') }}"><i class="fas fa-shopping-cart"></i> Sales</a>
        <a href="{{ url_for('billing_management') }}"><i class="fas fa-file-invoice-dollar"></i> Billing</a>
        <a href="{{ url_for('cashier_payment') }}" class="active"><i class="fas fa-credit-card"></i> Payments</a>
        <a href="{{ url_for('reports') }}"><i class="fas fa-chart-pie"></i> Reports</a>
        <a href="{{ url_for('logout') }}"><i class="fas fa-sign-out-alt"></i> Logout</a>
    </div>

    <div class="main-content">
        <div class="page-header">
            <h1>Payment Form</h1>
            <p>Submit and manage cashier payment entries.</p>
        </div>
        <div class="form-card">
            <form action="#" method="POST">

                <label>Invoice Number</label>
                <input type="text" name="invoice_number" required>

                <label>Customer Name</label>
                <input type="text" name="customer_name" required>

                <label>Payment Date</label>
                <input type="date" name="payment_date" required>

                <label>Amount Paid</label>
                <input type="number" name="amount_paid" step="0.01" required>

                <label>Payment Method</label>
                <select name="payment_method" required>
                    <option value="">-- Select Method --</option>
                    <option value="cash">Cash</option>
                    <option value="gcash">GCash</option>
                    <option value="bank">Bank Transfer</option>
                    <option value="card">Card</option>
                </select>

                <label>Reference Number</label>
                <input type="text" name="reference_number">

                <label>Status</label>
                <select name="status">
                    <option value="paid">Paid</option>
                    <option value="partial">Partial</option>
                    <option value="failed">Failed</option>
                </select>

                <label>Received By</label>
                <input type="text" name="received_by">

                <button type="submit">Submit Payment</button>
            </form>
        </div>
    </div>
</div>

</body>
</html>
